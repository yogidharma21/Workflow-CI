name: CI — MLflow Training & Docker Build

on:
  push:
    branches: [main]
    paths:
      - "MLProject/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-deploy:
    name: Train Model + Push Docker
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup Python ──────────────────────────────────────
      - name: Set Up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install Dependencies ───────────────────────────────
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas numpy scikit-learn matplotlib seaborn dagshub

      # ── 4. Run MLflow Project ─────────────────────────────────
      - name: Run MLflow Project (Training)
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ secrets.DAGSHUB_REPO_NAME }}.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject/ --env-manager=local -e main

      # ── 5. Commit Artifacts ke Repository ─────────────────────
      - name: Commit Artifacts to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add MLProject/artifacts/
          git diff --cached --quiet || git commit -m "chore: update model artifacts from CI run [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Upload Artifacts ke GitHub Actions ─────────────────
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: MLProject/artifacts/
          retention-days: 30

      # ── 7. Login ke Docker Hub ────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 8. Build Docker Image dengan MLflow ───────────────────
      - name: Build Docker Image (mlflow build-docker)
        run: |
          mlflow models build-docker \
            --model-uri "MLProject/artifacts/random_forest_model" \
            --name "${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model"

      # ── 9. Push Docker Image ke Docker Hub ───────────────────
      - name: Push Docker Image to Docker Hub
        run: |
          docker tag \
            ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:${{ github.sha }}

      # ── 10. Update DockerHub.txt ──────────────────────────────
      - name: Update DockerHub.txt
        run: |
          cat > MLProject/DockerHub.txt << EOF
          Docker Hub Image:
          https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model

          Tags:
          - latest
          - ${{ github.sha }}

          Perintah pull:
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-fraud-model:latest

          Author: Yogi-Dharma
          EOF
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add MLProject/DockerHub.txt
          git diff --cached --quiet || git commit -m "chore: update DockerHub link [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI - Credit Card Fraud MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE_NAME: credit-card-fraud-mlflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v3

      # ── 2. Set up Python 3.12.7 ─────────────────────────────────────────
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas numpy cloudpickle

      # ── 4. Run MLflow Project (menggunakan mlflow run + berkas MLProject) ─
      - name: Run MLflow Project (Training)
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO_NAME: ${{ secrets.DAGSHUB_REPO_NAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ secrets.DAGSHUB_REPO_NAME }}.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject --env-manager=local \
            -P dataset=credit_card_fraud_preprocessing.csv

      # ── 5. Set up Docker Buildx ─────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6. Login to Docker Hub ──────────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 7. Build Docker Image menggunakan mlflow models build-docker ─────
      - name: Build Docker Image with MLflow
        run: |
          RUN_ID=$(python3 -c "
          import os, glob
          runs = glob.glob('mlruns/0/*/meta.yaml')
          runs = [r for r in runs if 'meta' not in r.split('/')[-2]]
          latest = sorted(runs, key=os.path.getmtime, reverse=True)
          if latest:
              print(latest[0].split('/')[2])
          ")
          MODEL_URI="mlruns/0/${RUN_ID}/artifacts/model"
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest"

          echo "Run ID    : $RUN_ID"
          echo "Model URI : $MODEL_URI"
          echo "Image tag : $IMAGE_TAG"

          mlflow models build-docker \
            --model-uri "$MODEL_URI" \
            --name "$IMAGE_TAG"

      # ── 8. Push Docker Image ke Docker Hub ──────────────────────────────
      - name: Push Docker Image to Docker Hub
        run: |
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest"
          docker push "$IMAGE_TAG"
          echo "Docker image pushed: $IMAGE_TAG"

      # ── 9. Simpan link Docker Hub ke repository ──────────────────────────
      - name: Save Docker Hub link to repo
        run: |
          echo "https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}" \
            > MLProject/DockerHub.txt
          git config --global user.name "${{ secrets.GIT_USERNAME }}"
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
          git add MLProject/DockerHub.txt
          git commit -m "ci: update Docker Hub link [skip ci]" || echo "Nothing to commit"
          git push origin main || echo "Nothing to push"
